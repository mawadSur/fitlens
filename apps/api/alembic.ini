# Alembic configuration for FitLens API.
#
# The sqlalchemy.url below is a placeholder only. At runtime env.py overrides it
# with app.config.settings.database_url so migrations always follow the same
# environment as the application (set DATABASE_URL to target a different DB).

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Template used to generate migration file names; uncomment to prepend a date.
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Use os.pathsep to separate paths prepended to sys.path. Empty -> CWD.
prepend_sys_path = .

# Placeholder; overridden in env.py from settings.database_url.
sqlalchemy.url = sqlite:///./.fitlens.db


[post_write_hooks]
# No post-write hooks configured.


# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
