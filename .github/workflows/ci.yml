name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run pytest
        working-directory: apps/api
        run: python -m pytest -q

  web-build:
    name: Web build (tsc + next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type-check
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/web
        run: npm run build

  web-e2e:
    name: Web e2e (Playwright)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright Chrome
        working-directory: apps/web
        run: npx playwright install --with-deps chrome

      - name: Run Playwright e2e against a live stack
        working-directory: apps/web
        env:
          API_BASE: http://localhost:8000
        run: |
          set -e
          # FastAPI auto-seeds demo data on boot (deterministic fixtures for e2e)
          (cd "$GITHUB_WORKSPACE/apps/api" && python -m uvicorn app.main:app --port 8000) > /tmp/api.log 2>&1 &
          # Next.js production server (proxies /api/* -> API_BASE)
          (npm start) > /tmp/web.log 2>&1 &
          echo "waiting for API on :8000…"
          for i in $(seq 1 60); do curl -sf http://127.0.0.1:8000/api/health >/dev/null 2>&1 && { echo "api up (${i}s)"; break; }; sleep 1; done
          echo "waiting for web on :3000…"
          for i in $(seq 1 60); do curl -sf http://127.0.0.1:3000 >/dev/null 2>&1 && { echo "web up (${i}s)"; break; }; sleep 1; done
          npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
